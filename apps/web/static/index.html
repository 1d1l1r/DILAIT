<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DILIAT</title>
    <link rel="stylesheet" href="/static/home.css?v=20260516a" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-topbar">
        <div class="title-block">
          <p id="page-kicker" class="topbar-kicker">Local lights</p>
          <h1 id="page-title">DILIAT</h1>
          <p id="page-subtitle" class="topbar-copy is-hidden"></p>
        </div>
        <div class="topbar-nav">
          <button id="back-button" class="icon-button is-inert" type="button" aria-label="Back">Back</button>
          <button id="home-button" class="icon-button is-inert" type="button" aria-label="Home">Home</button>
        </div>
        <button id="refresh-button" class="pill-button" type="button">Refresh</button>
      </header>

      <div id="toast" class="toast is-hidden" role="status" aria-live="polite"></div>

      <section id="screen-content" class="screen-frame"></section>

      <nav class="add-dock" aria-label="Quick add">
        <button class="dock-button" data-add-screen="add-room" type="button">Room+</button>
        <button class="dock-button" data-add-screen="add-device" type="button">Light+</button>
        <button class="dock-button" data-add-screen="add-group" type="button">Group+</button>
        <button class="dock-button" data-add-screen="add-scene" type="button">Scene+</button>
        <button class="dock-button" data-add-screen="add-schedule" type="button">Rule+</button>
        <button class="dock-button" data-add-screen="add-link" type="button">Link+</button>
      </nav>

      <footer class="app-footer">
        <div class="footer-language">
          <button class="footer-toggle is-active" data-locale="ru" type="button">RU</button>
          <button class="footer-toggle" data-locale="en" type="button">EN</button>
          <button class="footer-toggle" data-locale="kk" type="button">KK</button>
        </div>
        <a class="footer-link" href="/advanced">Advanced</a>
      </footer>
    </main>

    <script src="/static/home.js?v=20260516a" type="module"></script>
  </body>
</html>
